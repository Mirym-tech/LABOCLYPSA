<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión — LabSystem</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f4f3ef;--surface:#fff;--border:#e2e0d8;--border2:#ccc9be;
    --text:#1a1916;--text2:#6b6860;--text3:#9e9b92;
    --accent:#1a5c3a;--accent-light:#e8f2ec;--accent-mid:#2d8a58;
    --red:#7a1a1a;--red-light:#fde8e8;
    --radius:8px;--font:'DM Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .login-wrap{width:100%;max-width:400px;padding:24px;}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:36px 32px;}
  .logo{text-align:center;margin-bottom:28px;}
  .logo-icon{width:48px;height:48px;background:var(--accent-light);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
  .logo-icon svg{width:24px;height:24px;stroke:var(--accent);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
  .logo-name{font-size:18px;font-weight:600;letter-spacing:-0.4px;}
  .logo-sub{font-size:12px;color:var(--text3);margin-top:2px;}
  h1{font-size:15px;font-weight:500;margin-bottom:4px;}
  .subtitle{font-size:13px;color:var(--text3);margin-bottom:24px;}
  .form-group{margin-bottom:16px;}
  label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;}
  input[type=email],input[type=password]{width:100%;font-family:var(--font);font-size:13px;color:var(--text);background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 12px;outline:none;transition:border-color 0.15s;}
  input:focus{border-color:var(--accent);background:#fff;}
  .btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:var(--radius);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all 0.15s;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{background:var(--accent-mid);}
  .btn-primary:disabled{opacity:0.6;cursor:not-allowed;}
  .btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .error-box{background:var(--red-light);border:1px solid #f5c6c6;border-radius:var(--radius);padding:10px 12px;font-size:13px;color:var(--red);margin-bottom:16px;display:none;}
  .error-box.show{display:block;}
  .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .footer-note{text-align:center;font-size:11px;color:var(--text3);margin-top:20px;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M9 3H5a2 2 0 0 0-2 2v4"/><path d="M9 3h6"/><path d="M15 3h4a2 2 0 0 1 2 2v4"/><path d="M3 9v6"/><path d="M21 9v6"/><path d="M3 15v2a2 2 0 0 0 2 2h4"/><path d="M21 15v2a2 2 0 0 1-2 2h-4"/><path d="M9 21h6"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      </div>
      <div class="logo-name">LabSystem</div>
      <div class="logo-sub">Sistema de laboratorio clínico</div>
    </div>

    <h1>Iniciar sesión</h1>
    <p class="subtitle">Ingresa con tu correo y contraseña</p>

    <div class="error-box" id="error-box"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="correo@laboratorio.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button class="btn btn-primary" type="submit" id="btn-login">
        <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Ingresar
      </button>
    </form>
  </div>
  <p class="footer-note">Acceso restringido — solo personal autorizado</p>
</div>

<script src="js/config.js"></script>
<script>
  const API = API_BASE;

  // Si ya tiene sesión activa, redirigir al dashboard
  if (localStorage.getItem('lab_token')) {
    fetch(`${API}/auth/me`, {
      headers: { Authorization: `Bearer ${localStorage.getItem('lab_token')}` }
    }).then(r => { if (r.ok) window.location.href = 'index.html'; });
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    const errorBox = document.getElementById('error-box');
    errorBox.classList.remove('show');

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Ingresando...';

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
        }),
      });

      const body = await res.json();

      if (!res.ok) {
        errorBox.textContent = body.error || 'Error al iniciar sesión';
        errorBox.classList.add('show');
        return;
      }

      localStorage.setItem('lab_token', body.token);
      localStorage.setItem('lab_user', JSON.stringify(body.user));
      window.location.href = 'index.html';

    } catch {
      errorBox.textContent = 'No se pudo conectar con el servidor. Verifica que el backend esté corriendo.';
      errorBox.classList.add('show');
    } finally {
      btn.disabled = false;
      btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Ingresar`;
    }
  });
</script>
</body>
</html>
